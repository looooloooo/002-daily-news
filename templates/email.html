<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { max-width: 600px; margin: 0 auto; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; padding: 20px; }
  .header { background: #1a1a2e; color: #fff; padding: 24px; border-radius: 8px 8px 0 0; }
  .header h1 { margin: 0; font-size: 20px; }
  .header .date { color: #a0a0b0; font-size: 14px; margin-top: 4px; }
  .keywords { background: #16213e; color: #e94560; padding: 12px 24px; font-size: 14px; }
  .section { background: #fff; margin: 0; padding: 20px 24px; border-bottom: 1px solid #eee; }
  .section-title { font-size: 18px; margin: 0 0 12px 0; border-bottom: 2px solid #4a90d9; padding-bottom: 8px; }
  .bg-box { background: #f0f4ff; border-left: 3px solid #4a90d9; padding: 12px 16px; margin: 12px 0; font-size: 13px; color: #333; border-radius: 0 4px 4px 0; line-height: 1.7; }
  .card { border: 1px solid #e0e0e0; border-radius: 6px; padding: 16px; margin: 12px 0; }
  .card-title { font-size: 15px; font-weight: 600; margin: 0 0 8px 0; color: #1a1a2e; }
  .card-meta { font-size: 12px; color: #888; margin-bottom: 8px; }
  .card-section { font-size: 14px; margin: 8px 0; line-height: 1.7; }
  .card-section .label { font-weight: 600; color: #333; }
  .impacts { display: block; margin-top: 8px; }
  .impact { background: #fafafa; padding: 10px 14px; margin: 6px 0; border-radius: 4px; font-size: 13px; line-height: 1.6; }
  .impact .ilabel { font-size: 11px; color: #666; font-weight: 600; }
  .summary-box { background: #fffdf0; border-left: 3px solid #f0c040; padding: 12px 16px; margin: 12px 0; font-size: 14px; border-radius: 0 4px 4px 0; line-height: 1.7; }
  .recommend { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; padding: 20px 24px; }
  .recommend h2 { margin-top: 0; color: #ffd700; }
  .recommend a { color: #ffd700; }
  .discuss { background: #fff; padding: 20px 24px; border-radius: 0 0 8px 8px; }
  .discuss code { background: #f0f0f0; padding: 2px 6px; border-radius: 3px; font-size: 13px; }
  .footer { font-size: 12px; color: #999; text-align: center; padding: 16px; }
  .star-gold { color: #f0c040; }
  .star-silver { color: #a0a0a0; }
  .fire { color: #e94560; }
  .china-tag { background: #e94560; color: #fff; font-size: 11px; padding: 1px 6px; border-radius: 3px; margin-left: 6px; }
  .overseas-tag { background: #4a90d9; color: #fff; font-size: 11px; padding: 1px 6px; border-radius: 3px; margin-left: 6px; }
  h3 { font-size: 15px; margin: 16px 0 8px 0; color: #555; }
</style>
</head>
<body>
<div class="header">
  <h1>&#x1f4ec; 每日简报</h1>
  <div class="date">{{ date_cn }}</div>
</div>
<div class="keywords">{{ keywords }}</div>
{{ content }}
<div class="footer">
  <p>&#x1f916; Generated with DeepSeek &middot; 每日自动推送</p>
  <p>&#x1f4c2; 打开 Claude Code &rarr; 002-daily-news 目录 &rarr; <code>/discuss [id]</code> 深入讨论</p>
</div>
</body>
</html>
